<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🎧 سورة - تلاوات الدكتور سعيد راضي | مشغل احترافي</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Tahoma', system-ui, -apple-system, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: radial-gradient(ellipse at 20% 30%, #0a0f2a, #020617);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        .bg-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            pointer-events: none;
            z-index: 0;
            animation: floatOrb 25s infinite alternate ease-in-out;
        }

        @keyframes floatOrb {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(40px, -40px) scale(1.2); }
        }

        .bg-orb:nth-child(1) {
            width: 350px;
            height: 350px;
            background: #22c55e;
            top: -120px;
            right: -80px;
            animation-duration: 18s;
        }

        .bg-orb:nth-child(2) {
            width: 280px;
            height: 280px;
            background: #3b82f6;
            bottom: 10%;
            left: -100px;
            animation-duration: 22s;
            animation-delay: -5s;
        }

        .bg-orb:nth-child(3) {
            width: 450px;
            height: 450px;
            background: #f59e0b;
            bottom: -150px;
            right: -120px;
            animation-duration: 30s;
            opacity: 0.2;
        }

        .back-btn {
            position: fixed;
            top: 24px;
            left: 24px;
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(16px);
            color: white;
            padding: 12px 28px;
            border-radius: 60px;
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 1100;
            cursor: pointer;
            border: 1px solid rgba(34, 197, 94, 0.4);
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            font-weight: 500;
        }

        .back-btn:hover {
            background: #22c55e;
            border-color: #22c55e;
            transform: translateX(-4px);
        }

        .back-btn:active {
            transform: scale(0.96);
        }

        .player-card {
            position: relative;
            z-index: 20;
            background: rgba(12, 18, 34, 0.65);
            backdrop-filter: blur(28px);
            border-radius: 72px;
            padding: 36px 28px 44px;
            max-width: 540px;
            width: 100%;
            text-align: center;
            box-shadow: 0 35px 70px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(34, 197, 94, 0.25);
            margin-bottom: 100px;
        }

        .cover {
            width: 210px;
            height: 210px;
            border-radius: 50%;
            object-fit: cover;
            margin: 0 auto 24px;
            border: 4px solid #22c55e;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.4), 0 0 0 6px rgba(34, 197, 94, 0.2);
            transition: transform 0.3s;
        }

        .cover.rotating {
            animation: vinylSpin 24s linear infinite;
        }

        @keyframes vinylSpin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .title {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #ffffff, #cbd5e1);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .loading-badge {
            font-size: 13px;
            color: #22c55e;
            background: rgba(34, 197, 94, 0.15);
            display: inline-block;
            padding: 4px 16px;
            border-radius: 30px;
            margin-top: 6px;
            display: none;
        }

        .wave {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 6px;
            height: 60px;
            margin: 20px 0 10px;
        }

        .wave span {
            width: 6px;
            background: linear-gradient(180deg, #4ade80, #22c55e);
            border-radius: 10px;
            transition: height 0.08s ease;
        }

        .time-row {
            display: flex;
            justify-content: space-between;
            width: 92%;
            margin: 12px auto 8px;
            font-size: 14px;
            font-weight: 500;
            color: #94a3b8;
        }

        .progress-container {
            width: 92%;
            height: 8px;
            background: #1e293b;
            border-radius: 20px;
            margin: 0 auto 30px;
            cursor: pointer;
            position: relative;
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #22c55e, #a3e635);
            border-radius: 20px;
            position: relative;
            box-shadow: 0 0 8px #22c55e;
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            right: -6px;
            top: 50%;
            transform: translateY(-50%);
            width: 16px;
            height: 16px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 12px #22c55e;
            border: 2px solid #22c55e;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 28px;
            margin: 20px 0 20px;
        }

        .controls button {
            width: 58px;
            height: 58px;
            border-radius: 50%;
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.18, 0.89, 0.32, 1.28);
        }

        .controls button:active {
            transform: scale(0.88);
            background: #22c55e;
            color: #0f172a;
        }

        .play-btn {
            width: 92px;
            height: 92px;
            border-radius: 50%;
            background: linear-gradient(145deg, #22c55e, #15803d);
            border: none;
            margin: 8px auto 12px;
            cursor: pointer;
            position: relative;
            box-shadow: 0 12px 35px rgba(34, 197, 94, 0.5);
            transition: all 0.2s;
        }

        .play-btn:active {
            transform: scale(0.94);
        }

        .play-icon {
            position: absolute;
            top: 50%;
            left: 55%;
            transform: translate(-50%, -50%);
            width: 0;
            height: 0;
            border-style: solid;
            border-width: 18px 0 18px 32px;
            border-color: transparent transparent transparent #0f172a;
        }

        .pause-icon {
            width: 32px;
            height: 32px;
            position: relative;
        }

        .pause-icon::before,
        .pause-icon::after {
            content: "";
            position: absolute;
            width: 10px;
            height: 100%;
            background: #0f172a;
            top: 0;
            border-radius: 4px;
        }

        .pause-icon::before {
            left: 0;
        }

        .pause-icon::after {
            right: 0;
        }

        .volume-section {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
        }

        .volume-label {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            margin-bottom: 12px;
            color: #cbd5e1;
            font-size: 13px;
        }

        .volume-bar-container {
            width: 88%;
            height: 6px;
            background: #1e293b;
            border-radius: 10px;
            margin: 0 auto;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .volume-bar-fill {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #22c55e, #4ade80);
            border-radius: 10px;
        }

        .volume-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 18px;
            margin-top: 14px;
        }

        .volume-btn {
            background: rgba(255, 255, 255, 0.07);
            border: none;
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            transition: 0.2s;
        }

        .volume-btn:active {
            background: #22c55e;
            color: black;
            transform: scale(0.92);
        }

        .volume-percent {
            font-size: 13px;
            font-weight: bold;
            color: #22c55e;
            background: rgba(34, 197, 94, 0.2);
            padding: 5px 14px;
            border-radius: 40px;
            min-width: 60px;
        }

        .bottom-actions {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            justify-content: center;
            gap: 32px;
            z-index: 200;
            padding: 12px 28px;
            background: rgba(8, 12, 25, 0.75);
            backdrop-filter: blur(24px);
            border-radius: 100px;
            border: 1px solid rgba(34, 197, 94, 0.35);
        }

        .action-btn {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            transition: all 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.2);
        }

        .action-btn:active {
            transform: scale(0.88);
        }

        .bookmark-save-btn {
            background: linear-gradient(145deg, #2563eb, #1e40af);
            color: white;
        }

        .bookmark-list-btn {
            background: linear-gradient(145deg, #f59e0b, #b45309);
            color: white;
        }

        .playlist-btn {
            background: linear-gradient(145deg, #22c55e, #166534);
            color: white;
        }

        .toast {
            position: fixed;
            bottom: 130px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: #22c55e;
            color: #0f172a;
            padding: 12px 28px;
            border-radius: 60px;
            font-size: 14px;
            font-weight: bold;
            z-index: 2100;
            opacity: 0;
            transition: 0.25s ease;
            pointer-events: none;
            white-space: nowrap;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .bookmark-panel, .playlist-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(145deg, #0a0f1f, #030617);
            backdrop-filter: blur(40px);
            border-radius: 40px 40px 0 0;
            max-height: 78vh;
            transform: translateY(100%);
            transition: transform 0.45s cubic-bezier(0.34, 1.2, 0.64, 1);
            z-index: 1500;
            display: flex;
            flex-direction: column;
        }

        .bookmark-panel.show, .playlist-panel.show {
            transform: translateY(0);
        }

        .bookmark-panel { border-top: 3px solid #fbbf24; }
        .playlist-panel { border-top: 3px solid #4ade80; }

        .bookmark-header, .playlist-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 22px 28px;
            border-radius: 40px 40px 0 0;
        }

        .bookmark-header { background: rgba(251, 191, 36, 0.15); border-bottom: 1px solid rgba(251, 191, 36, 0.4); }
        .playlist-header { background: rgba(74, 222, 128, 0.12); border-bottom: 1px solid rgba(74, 222, 128, 0.4); }

        .bookmark-header h3 { color: #fbbf24; display: flex; align-items: center; gap: 14px; font-size: 22px; }
        .playlist-header h3 { color: #4ade80; display: flex; align-items: center; gap: 12px; font-size: 22px; }

        .close-bookmark, .close-playlist {
            background: rgba(255, 255, 255, 0.15);
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            color: white;
            cursor: pointer;
            font-size: 20px;
        }

        .close-bookmark:active, .close-playlist:active { background: #ef4444; transform: scale(0.9); }

        .bookmark-items-container, .playlist-items-container {
            flex: 1;
            overflow-y: auto;
            padding: 18px;
        }

        .bookmark-card {
            background: linear-gradient(115deg, rgba(251, 191, 36, 0.12), rgba(0, 0, 0, 0.6));
            border: 1px solid rgba(251, 191, 36, 0.5);
            border-radius: 32px;
            padding: 18px;
            margin-bottom: 16px;
        }

        .bookmark-time {
            font-size: 22px;
            font-weight: bold;
            color: #fde047;
            font-family: monospace;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0,0,0,0.4);
            padding: 6px 14px;
            border-radius: 40px;
            width: fit-content;
        }

        .playlist-search {
            padding: 14px 20px;
            background: rgba(0, 0, 0, 0.3);
        }

        .playlist-search input {
            width: 100%;
            padding: 14px 22px;
            border: none;
            border-radius: 60px;
            background: rgba(255, 255, 255, 0.12);
            color: white;
            text-align: right;
            outline: none;
            font-size: 15px;
        }

        .playlist-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 22px;
            margin: 8px 18px;
            border-radius: 40px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.05);
            transition: all 0.2s;
        }

        .playlist-item.active {
            background: linear-gradient(115deg, rgba(74, 222, 128, 0.35), rgba(74, 222, 128, 0.1));
            border: 1px solid #4ade80;
        }

        .playlist-item-number {
            width: 48px;
            height: 48px;
            background: rgba(74, 222, 128, 0.25);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #86efac;
            font-size: 18px;
        }

        .playlist-item-name {
            font-size: 18px;
            font-weight: 500;
            color: #f8fafc;
        }

        @media (max-width: 550px) {
            .cover { width: 160px; height: 160px; }
            .title { font-size: 22px; }
            .controls button { width: 48px; height: 48px; font-size: 20px; }
            .play-btn { width: 78px; height: 78px; }
            .action-btn { width: 54px; height: 54px; font-size: 24px; }
            .bottom-actions { gap: 20px; padding: 8px 20px; bottom: 20px; }
        }
    </style>
</head>

        function getSurahUrlByNumber(num) {
            return cloudinaryUrls[num] || null;
        }

        // استعادة بيانات السورة
        let currentSurahIndex = parseInt(localStorage.getItem("selectedSurahIndex")) || 0;
        let currentSurahName = localStorage.getItem("selectedSurahName") || surahs[currentSurahIndex];
        let currentSurahUrl = localStorage.getItem("selectedSurahUrl");
        let currentSurahNumber = parseInt(localStorage.getItem("selectedSurahNumber")) || (currentSurahIndex + 1);

        localStorage.removeItem("selectedSurahIndex");
        localStorage.removeItem("selectedSurahName");
        localStorage.removeItem("selectedSurahUrl");
        localStorage.removeItem("selectedSurahNumber");

        if (!currentSurahUrl && cloudinaryUrls[currentSurahNumber]) {
            currentSurahUrl = cloudinaryUrls[currentSurahNumber];
        }

        // عناصر DOM
        const audio = document.getElementById("audio");
        const playBtn = document.getElementById("playBtn");
        const playIcon = document.getElementById("playIcon");
        const surahTitleSpan = document.getElementById("surahTitle");
        const currentTimeSpan = document.getElementById("currentTime");
        const totalDurationSpan = document.getElementById("totalDuration");
        const progressFill = document.getElementById("progressFill");
        const progressContainer = document.getElementById("progressContainer");
        const prevBtn = document.getElementById("prevBtn");
        const nextBtn = document.getElementById("nextBtn");
        const seekBackBtn = document.getElementById("seekBackBtn");
        const seekForwardBtn = document.getElementById("seekForwardBtn");
        const loadingBadge = document.getElementById("loadingBadge");
        const waveSpans = document.querySelectorAll("#wave span");
        const coverImg = document.getElementById("coverImg");
        const backBtn = document.getElementById("backBtn");
        const toastEl = document.getElementById("toast");
        const volumeBarContainer = document.getElementById("volumeBarContainer");
        const volumeBarFill = document.getElementById("volumeBarFill");
        const volumePercent = document.getElementById("volumePercent");
        const volumeDownBtn = document.getElementById("volumeDownBtn");
        const volumeUpBtn = document.getElementById("volumeUpBtn");
        const volumeMuteBtn = document.getElementById("volumeMuteBtn");

        // متغيرات
        let isPlaying = false;
        let isTimeRestored = false;
        let waveInterval = null;

        // دوال مساعدة
        function formatTime(seconds) {
            if (isNaN(seconds)) return "0:00";
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
        }

        function showToast(msg) {
            toastEl.textContent = msg;
            toastEl.classList.add("show");
            setTimeout(() => toastEl.classList.remove("show"), 2000);
        }

        function startWaveAnimation() {
            if (waveInterval) clearInterval(waveInterval);
            waveInterval = setInterval(() => {
                if (isPlaying) {
                    waveSpans.forEach(span => {
                        const h = Math.floor(Math.random() * 35) + 10;
                        span.style.height = `${h}px`;
                    });
                } else {
                    waveSpans.forEach(span => span.style.height = "8px");
                }
            }, 120);
        }

        function updatePlayPauseUI() {
            if (isPlaying) {
                playIcon.className = "pause-icon";
                coverImg.classList.add("rotating");
            } else {
                playIcon.className = "play-icon";
                coverImg.classList.remove("rotating");
            }
        }

        // ========== الوظيفة الأساسية: تشغيل السورة مباشرة (بدون Blob) ==========
        function loadSurah() {
            if (!currentSurahUrl) {
                surahTitleSpan.textContent = `⚠️ سورة ${currentSurahName}`;
                loadingBadge.style.display = "block";
                loadingBadge.textContent = "❌ الرابط غير متوفر";
                showToast("⚠ رابط السورة غير موجود");
                return;
            }

            loadingBadge.style.display = "block";
            loadingBadge.textContent = "⏳ جاري التحميل...";
            surahTitleSpan.textContent = `🎧 سورة ${currentSurahName}`;

            // إيقاف التشغيل الحالي
            audio.pause();
            isPlaying = false;

            // تشغيل الملف مباشرة من الرابط (دون fetch أو Blob)
            audio.src = currentSurahUrl;
            audio.load();

            // حفظ في localStorage للتشغيل التلقائي لاحقاً
            localStorage.setItem("audioSrc", currentSurahUrl);
            localStorage.setItem("surahIndex", currentSurahIndex);

            isTimeRestored = false;
            displayBookmarks();

            let savedTime = localStorage.getItem(`surah_${currentSurahIndex}_time`);

            // عند تحميل البيانات الوصفية
            audio.onloadedmetadata = () => {
                if (!isTimeRestored && savedTime && parseFloat(savedTime) > 0 && audio.duration > parseFloat(savedTime)) {
                    audio.currentTime = parseFloat(savedTime);
                    isTimeRestored = true;
                }
                totalDurationSpan.textContent = formatTime(audio.duration);
                loadingBadge.style.display = "none";

                // محاولة التشغيل التلقائي
                audio.play().then(() => {
                    isPlaying = true;
                    updatePlayPauseUI();
                    startWaveAnimation();
                }).catch(e => console.log("Auto-play prevented:", e));
            };

            audio.onerror = (e) => {
                console.error("Audio error:", e);
                loadingBadge.style.display = "block";
                loadingBadge.textContent = "❌ خطأ في تحميل الصوت";
                showToast("⚠ حدث خطأ في تحميل السورة");
            };
        }

        // تغيير السورة
        function changeSurah(newIndex) {
            if (newIndex < 0 || newIndex >= surahs.length) return;
            currentSurahIndex = newIndex;
            currentSurahName = surahs[currentSurahIndex];
            currentSurahNumber = currentSurahIndex + 1;
            currentSurahUrl = getSurahUrlByNumber(currentSurahNumber);
            
            if (!currentSurahUrl) {
                showToast(`⚠️ سورة ${currentSurahName} غير متوفرة حالياً`);
                return;
            }
            
            loadSurah();
        }

        // حفظ الوقت الحالي
        function saveCurrentTime() {
            if (audio.duration && !isNaN(audio.currentTime)) {
                localStorage.setItem(`surah_${currentSurahIndex}_time`, audio.currentTime);
            }
        }

        // ========== المفضلات ==========
        function getBookmarks() {
            const saved = localStorage.getItem(`bookmarks_surah_${currentSurahIndex}`);
            return saved ? JSON.parse(saved) : [];
        }

        function saveBookmarks(bookmarks) {
            localStorage.setItem(`bookmarks_surah_${currentSurahIndex}`, JSON.stringify(bookmarks));
            displayBookmarks();
            document.getElementById("bookmarkCount").innerText = bookmarks.length;
        }

        function addBookmark() {
            const currentTime = audio.currentTime;
            if (!currentTime || isNaN(currentTime)) return;
            const bookmarks = getBookmarks();
            if (!bookmarks.find(b => Math.abs(b.time - currentTime) < 1)) {
                bookmarks.push({ time: currentTime, comment: `⏱️ ${formatTime(currentTime)}` });
                bookmarks.sort((a, b) => a.time - b.time);
                saveBookmarks(bookmarks);
                showToast("✅ تمت إضافة العلامة");
            } else {
                showToast("⚠️ هذه العلامة موجودة مسبقاً");
            }
        }

        function deleteBookmark(time) {
            let bookmarks = getBookmarks();
            bookmarks = bookmarks.filter(b => b.time !== time);
            saveBookmarks(bookmarks);
            showToast("🗑️ تم حذف العلامة");
        }

        function goToBookmark(time) {
            audio.currentTime = time;
            if (!isPlaying) {
                audio.play().then(() => {
                    isPlaying = true;
                    updatePlayPauseUI();
                    startWaveAnimation();
                }).catch(e => console.log(e));
            }
            showToast(`🎯 الانتقال إلى ${formatTime(time)}`);
        }

        function displayBookmarks() {
            const container = document.getElementById("bookmarkList");
            if (!container) return;
            const bookmarks = getBookmarks();
            document.getElementById("bookmarkCount").innerText = bookmarks.length;
            if (bookmarks.length === 0) {
                container.innerHTML = `<div style="text-align:center; padding:40px; color:#94a3b8;">📌 لا توجد علامات</div>`;
                return;
            }
            container.innerHTML = bookmarks.map(b => `
                <div class="bookmark-card">
                    <div class="bookmark-time" onclick="goToBookmark(${b.time})">
                        <i class="fas fa-play-circle"></i> ${formatTime(b.time)}
                    </div>
                    <div style="display:flex; justify-content:flex-end; margin-top:12px;">
                        <button onclick="deleteBookmark(${b.time})" style="background:rgba(239,68,68,0.8); border:none; padding:8px 16px; border-radius:30px; color:white;">
                            <i class="fas fa-trash"></i> حذف
                        </button>
                    </div>
                </div>
            `).join("");
        }

        // ========== قائمة السور ==========
        function renderPlaylist(filter = "") {
            const container = document.getElementById("playlistItems");
            if (!container) return;
            let filtered = surahs.map((name, idx) => ({ idx, name, num: idx+1 }))
                .filter(item => item.name.includes(filter));
            document.getElementById("playlistCount").innerText = filtered.length;
            container.innerHTML = filtered.map(item => `
                <div class="playlist-item ${item.idx === currentSurahIndex ? 'active' : ''}" data-index="${item.idx}">
                    <div class="playlist-item-number">${item.num}</div>
                    <div class="playlist-item-name">${item.name}</div>
                    <i class="fas fa-headphones" style="color:#4ade80;"></i>
                </div>
            `).join("");
            document.querySelectorAll(".playlist-item").forEach(el => {
                el.addEventListener("click", () => {
                    const idx = parseInt(el.dataset.index);
                    if (!isNaN(idx) && idx !== currentSurahIndex) {
                        changeSurah(idx);
                        document.getElementById("playlistPanel").classList.remove("show");
                    }
                });
            });
        }

        // ========== أحداث الصوت ==========
        audio.addEventListener("timeupdate", () => {
            if (audio.duration) {
                const percent = (audio.currentTime / audio.duration) * 100;
                progressFill.style.width = `${percent}%`;
                currentTimeSpan.textContent = formatTime(audio.currentTime);
            }
        });

        audio.addEventListener("ended", () => {
            isPlaying = false;
            updatePlayPauseUI();
            if (waveInterval) clearInterval(waveInterval);
            waveSpans.forEach(span => span.style.height = "8px");
            saveCurrentTime();
        });

        audio.addEventListener("play", () => {
            isPlaying = true;
            updatePlayPauseUI();
            startWaveAnimation();
        });

        audio.addEventListener("pause", () => {
            isPlaying = false;
            updatePlayPauseUI();
            saveCurrentTime();
        });

        progressContainer.addEventListener("click", (e) => {
            const rect = progressContainer.getBoundingClientRect();
            const percent = (e.clientX - rect.left) / rect.width;
            if (audio.duration) {
                audio.currentTime = percent * audio.duration;
            }
        });

        // ========== التحكم بالصوت ==========
        function setVolume(value) {
            let vol = Math.min(1, Math.max(0, value));
            audio.volume = vol;
            volumeBarFill.style.width = `${vol * 100}%`;
            volumePercent.innerText = `${Math.round(vol * 100)}%`;
            if (vol === 0) volumeMuteBtn.innerHTML = '<i class="fas fa-volume-mute"></i>';
            else volumeMuteBtn.innerHTML = '<i class="fas fa-volume-up"></i>';
            localStorage.setItem("playerVolume", vol);
        }

        volumeBarContainer.addEventListener("click", (e) => {
            const rect = volumeBarContainer.getBoundingClientRect();
            let percent = (e.clientX - rect.left) / rect.width;
            setVolume(percent);
        });

        volumeDownBtn.addEventListener("click", () => setVolume(audio.volume - 0.1));
        volumeUpBtn.addEventListener("click", () => setVolume(audio.volume + 0.1));
        volumeMuteBtn.addEventListener("click", () => setVolume(audio.volume === 0 ? 1 : 0));

        let savedVol = localStorage.getItem("playerVolume");
        if (savedVol !== null) setVolume(parseFloat(savedVol));
        else setVolume(1);

        // ========== ربط الأزرار ==========
        playBtn.onclick = () => {
            if (audio.src) {
                if (isPlaying) audio.pause();
                else audio.play();
            } else loadSurah();
        };
        prevBtn.onclick = () => changeSurah(currentSurahIndex - 1);
        nextBtn.onclick = () => changeSurah(currentSurahIndex + 1);
        seekBackBtn.onclick = () => audio.currentTime = Math.max(0, audio.currentTime - 10);
        seekForwardBtn.onclick = () => audio.currentTime = Math.min(audio.duration, audio.currentTime + 10);
        backBtn.onclick = () => window.location.href = "index.html";

        // المفضلات
        window.goToBookmark = goToBookmark;
        window.deleteBookmark = deleteBookmark;
        document.getElementById("bookmarkSaveBtn").onclick = addBookmark;
        document.getElementById("bookmarkListBtn").onclick = () => {
            displayBookmarks();
            document.getElementById("bookmarkPanel").classList.add("show");
        };
        document.getElementById("closeBookmarkBtn").onclick = () => document.getElementById("bookmarkPanel").classList.remove("show");

        // قائمة السور
        document.getElementById("playlistBtn").onclick = () => {
            renderPlaylist();
            document.getElementById("playlistPanel").classList.add("show");
        };
        document.getElementById("closePlaylistBtn").onclick = () => document.getElementById("playlistPanel").classList.remove("show");
        document.getElementById("playlistCloseBtn").onclick = () => document.getElementById("playlistPanel").classList.remove("show");
        document.getElementById("playlistSearch").addEventListener("input", (e) => renderPlaylist(e.target.value));

        // بدء التشغيل
        startWaveAnimation();
        loadSurah();
    </script>
</body>
</html>
