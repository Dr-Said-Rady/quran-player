            animation: cardFadeIn 0.3s forwards;
            position: relative;
            overflow: hidden;
            will-change: transform;
            backface-visibility: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;

        }

            transform: scale(0.97);
            background: #22c55e;
            color: #0f172a;
        }

        @keyframes cardFadeIn {

        }

        function getSurahUrl(surahNumber) {
            return cloudinaryUrls[surahNumber] || null;
        }

        const listDiv = document.getElementById("surah-list");
        const searchInput = document.getElementById("search");
        const loadingSpinner = document.getElementById("loadingSpinner");

        function displaySurahs(filter = "") {
            listDiv.innerHTML = "";
            loadingSpinner.classList.add("hidden");

            const fragment = document.createDocumentFragment();
            let visibleCount = 0;

            for (let i = 0; i < surahs.length; i++) {
                const name = surahs[i];
                const surahNumber = i + 1;
                const hasUrl = cloudinaryUrls[surahNumber] !== undefined;

                if (filter === "" || name.includes(filter)) {
                    const card = document.createElement("div");
                    card.className = "card";
                    card.style.setProperty('--i', visibleCount % 50);
                    card.textContent = `${surahNumber}. ${name}`;
                    
                    if (!hasUrl) {
                        card.style.opacity = "0.7";
                    }

                    card.onclick = () => {
                        const url = getSurahUrl(surahNumber);
                        if (!url) {
                            alert(`⚠️ سورة ${name} لم يتم رفعها على Cloudinary بعد.\nسيتم إضافتها قريبًا إن شاء الله.`);
                            return;
                        }
                        localStorage.setItem("selectedSurahIndex", i);
                        localStorage.setItem("selectedSurahName", name);
                        localStorage.setItem("selectedSurahUrl", url);
                        localStorage.setItem("selectedSurahNumber", surahNumber);
                        window.location.href = "player.html";
                    };
                    
                    fragment.appendChild(card);
                    visibleCount++;
                }
            }
            
            listDiv.appendChild(fragment);
        }

        let searchTimeout;
        searchInput.addEventListener("input", (e) => {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => displaySurahs(e.target.value), 200);
        });

        // ========== PWA التثبيت - يظهر البانر فقط عند الحاجة ==========
        const installBannerEl = document.getElementById("installBanner");
        const installBtnEl = document.getElementById("installBtn");
        const closeInstallBtnEl = document.getElementById("closeInstallBtn");
        const installInstructionsEl = document.getElementById("installInstructions");
        const closeInstructionsBtnEl = document.getElementById("closeInstructionsBtn");
        let deferredPrompt = null;

        // التحقق إذا كان التطبيق مثبتًا مسبقًا
        const isInstalled = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
        
        if (!isInstalled) {
            // محاولة إظهار البانر بعد ثانية (في حالة عدم ظهور beforeinstallprompt)
            setTimeout(() => {
                if (installBannerEl && !installBannerEl.classList.contains("show")) {
                    installBannerEl.classList.add("show");
                }
            }, 1500);
        } else {
            installBannerEl.style.display = "none";
        }

        closeInstallBtnEl.addEventListener("click", () => {
            installBannerEl.classList.remove("show");
        });

        window.addEventListener("beforeinstallprompt", (e) => {
            e.preventDefault();
            deferredPrompt = e;
            // إظهار البانر عند توفر التثبيت
            installBannerEl.classList.add("show");
        });

        installBtnEl.addEventListener("click", async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                deferredPrompt = null;
                installBannerEl.classList.remove("show");
            } else {
                // في حالة عدم وجود beforeinstallprompt (iOS أو متصفحات لا تدعم)
                installBannerEl.classList.remove("show");
                installInstructionsEl.classList.add("show");
            }
        });

        closeInstructionsBtnEl.addEventListener("click", () => installInstructionsEl.classList.remove("show"));

        window.addEventListener("load", () => {
            displaySurahs("");
            if (isInstalled) {
                document.documentElement.requestFullscreen?.();
            }
        });
    </script>
    <script>
// منع الصفحة البيضاء في التطبيق المثبت
(function() {
    const isPWA = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
    
    if (isPWA) {
        console.log('يعمل كتطبيق مثبت');
        
        // التأكد من تحميل الأيقونات
        if (!document.querySelector('link[href*="font-awesome"]')) {
            const link = document.createElement('link');
            link.rel = 'stylesheet';
            link.href = 'https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css';
            document.head.appendChild(link);
        }
        
        // إذا كانت الصفحة فارغة -> إعادة تحميل
        if (document.body.innerText.trim() === '' || document.body.children.length < 2) {
            console.log('صفحة فارغة، إعادة تحميل...');
            window.location.reload();
        }
    }
})();

// تسجيل Service Worker جديد
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').then(reg => {
        console.log('Service Worker مسجل');
        reg.onupdatefound = () => {
            const newWorker = reg.installing;
            newWorker.onstatechange = () => {
                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                    console.log('تحديث جاهز');
                    // إعادة تحميل لتطبيق التحديث
                    window.location.reload();
                }
            };
        };
    }).catch(err => console.log('خطأ في التسجيل:', err));
}
</script>
